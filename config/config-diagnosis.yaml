# Phase 5 diagnosis demo config.
# Usage:
#   LLM_API_KEY=<your-deepseek-key> go run ./cmd/agent/ config/config-diagnosis.yaml
#
# Uses the same correlator demo logs (bank-gateway cascading failure).
# Diagnoser enriches the incident with LLM-generated root cause and suggestions.

source:
  type: file

services:
  - name: order-service
    path: testdata/demo/order-service.ndjson
  - name: payment-service
    path: testdata/demo/payment-service.ndjson
  - name: bank-gateway
    path: testdata/demo/bank-gateway.ndjson

aggregation:
  window: 5s
  min_count: 1

pattern:
  enabled: true
  depth: 4
  similarity: 0.5
  max_children: 100
  max_patterns: 10000
  extract_json_message: true

anomaly:
  enabled: true
  spike_multiplier: 3.0
  rate_jump_factor: 5.0
  ema_alpha: 0.3
  min_samples: 3
  new_pattern_grace: 24h

correlator:
  enabled: true
  window: 5s
  dependencies_file: config/dependencies.yaml

diagnosis:
  enabled: true
  endpoint: https://api.deepseek.com/v1/chat/completions
  model: deepseek-chat
  max_tokens: 1024
  temperature: 0
  timeout: 30s

notification:
  channels:
    - type: log
