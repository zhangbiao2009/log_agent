# Phase 4 correlator demo config.
# Usage: cd log_agent && go run ./cmd/agent/ config/config-correlator.yaml
#
# Demonstrates: bank-gateway goes down → payment-service fails → order-service fails
# All three are grouped into one incident with bank-gateway as root cause.

source:
  type: file
  file:
    path: testdata/correlator_demo.ndjson

aggregation:
  window: 5s
  min_count: 1

pattern:
  enabled: true
  depth: 4
  similarity: 0.5
  max_children: 100
  max_patterns: 10000
  extract_json_message: true

anomaly:
  enabled: true
  spike_multiplier: 3.0
  rate_jump_factor: 5.0
  ema_alpha: 0.3
  min_samples: 3
  new_pattern_grace: 24h

correlator:
  enabled: true
  window: 5s
  dependencies_file: config/dependencies.yaml

notification:
  channels:
    - type: log
