# Local testing config — reads from a fixture file instead of Loki.
# Usage: go run ./cmd/agent/ config/config-file.yaml
#
# To add your own logs: append NDJSON lines to testdata/sample_logs.ndjson
# Format: {"service":"<name>","timestamp":"<RFC3339>","raw":"<log line>"}

source:
  type: file
  file:
    path: testdata/sample_logs.ndjson

aggregation:
  window: 5s    # short window so all fixture lines land in one pass
  min_count: 1

pattern:
  enabled: true
  depth: 4
  similarity: 0.5
  max_children: 100
  max_patterns: 10000
  extract_json_message: true

# Anomaly detector: set enabled: false to get Phase 2 behaviour (all windows alerted).
anomaly:
  enabled: true
  spike_multiplier: 3.0
  rate_jump_factor: 5.0
  ema_alpha: 0.3
  min_samples: 3            # spike/rate-jump activate after 3 baseline windows
  new_pattern_grace: 24h   # same as production; patterns only flagged New once per day

correlator:
  enabled: true
  window: 5s                # short window matching aggregation for local testing
  dependencies_file: config/dependencies.yaml

notification:
  channels:
    - type: log
