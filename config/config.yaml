loki:
  url: "http://localhost:3000/api/datasources/proxy/uid/loki-infra-logging-us-dev-5-001"
  query: '{container="notifications-processor"}'
  poll_interval: 30s
  tenant_id: ""           # Not needed when going through Grafana proxy
  service_label: "app"    # Extract service name from "app" label
  basic_auth_user: "root"
  basic_auth_password: "${GRAFANA_PASSWORD}"

aggregation:
  window: 1m
  min_count: 1

pattern:
  enabled: true
  depth: 4
  similarity: 0.5
  max_children: 100
  max_patterns: 10000
  extract_json_message: true

anomaly:
  enabled: true
  spike_multiplier: 3.0     # alert when count > mean + 3σ
  rate_jump_factor: 5.0     # alert when count > 5× mean
  ema_alpha: 0.3            # EMA weight (0.1=slow adapt, 0.5=fast adapt)
  min_samples: 5            # windows before spike/rate-jump detection activates
  new_pattern_grace: 24h   # patterns unseen longer than this are flagged New

notification:
  channels:
    - type: log
